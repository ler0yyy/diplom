<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Голос принят — PollPoint</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-center page-center--success">
  <div class="text-center" style="max-width:28rem;">
    <div class="success-icon" id="success-icon"></div>
    <h1 style="font-size:2rem;font-weight:700;margin-bottom:1rem;">Голос принят!</h1>
    <p style="font-size:1.125rem;color:var(--gray-600);margin-bottom:2rem;">
      Спасибо за участие в опросе. Результаты будут показаны преподавателем после завершения голосования.
    </p>
    <div class="card card--bordered">
      <p style="font-size:0.875rem;color:var(--gray-600);margin-bottom:0.75rem;">Ожидайте следующий вопрос</p>
      <div class="wait-dots"><span></span><span></span><span></span></div>
    </div>
    <p style="font-size:0.75rem;color:var(--gray-500);margin-top:1.5rem;">
      Вы можете закрыть эту страницу или дождаться следующего вопроса
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="js/icons.js"></script>
  <script>
    document.getElementById('success-icon').innerHTML = Icons.checkCircle;
    confetti({
      particleCount: 100,
      spread: 70,
      origin: { y: 0.6 },
      colors: ['#3B82F6', '#10B981', '#F59E0B'],
    });
  </script>
</body>
</html>
